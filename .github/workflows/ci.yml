# CI for jetstream-v2.
#
# Security posture
# ----------------
# This workflow is hardened against the standard GitHub Actions footguns.
# Every choice below is deliberate; please read the rationale before relaxing
# any of these settings.
#
#   1. Every third-party action is pinned to a full 40-character commit SHA,
#      not a mutable tag. Tags can be force-pushed (cf. the tj-actions/
#      changed-files compromise of March 2025); commit SHAs cannot. Dependabot
#      is configured separately to update these in PRs we can review.
#
#   2. The workflow-level `permissions:` block grants nothing. Each job adds
#      only the scopes it needs. The default GITHUB_TOKEN on older repos can
#      be alarmingly broad — empty-by-default + per-job opt-in is least
#      privilege.
#
#   3. `actions/checkout` runs with `persist-credentials: false` so the token
#      isn't left in `.git/config` for subsequent steps (or any code those
#      steps execute) to read. We're not pushing from CI, so we don't need it.
#
#   4. `step-security/harden-runner` blocks all egress except an explicit
#      allowlist. This neuters a compromised dependency's ability to
#      exfiltrate secrets or source code. If a future change adds a new
#      legitimate egress target, the audit log will show the block; widen
#      the allowlist in a reviewed PR.
#
#   5. We use `push` only. Only users with write access to this repo can
#      push refs, so CI never executes code from an untrusted source. We
#      explicitly do NOT use `pull_request` (runs untrusted PR code, even
#      with secrets stripped) or `pull_request_target` (runs untrusted PR
#      code WITH secrets — the canonical "GitHub Actions PR pwn" vector).
#
#   6. `GOTOOLCHAIN=local` pins us to the Go version setup-go installs. Go's
#      auto-toolchain feature would otherwise silently download and run a
#      different version if `go.mod` declared something newer, defeating the
#      whole point of pinning.
#
#   7. The runner image is pinned to a specific Ubuntu version, not
#      `ubuntu-latest`, so a Microsoft-side image roll can't change build
#      behavior under us.
#
#   8. Each job has a `timeout-minutes` cap so a hung test or wedged dep
#      fetch can't hold a runner indefinitely.
#
#   9. The concurrency group cancels superseded runs on feature branches
#      (a fast-follow push obsoletes the previous run), but deliberately
#      does NOT cancel runs on `main`, where every commit's signal is
#      independently valuable for `git bisect`.
#
#  10. We never interpolate untrusted event payload fields (PR titles,
#      commit messages, branch names, etc.) into `run:` shell strings.
#      Doing so is the canonical GitHub Actions script-injection vector.
#
#  11. All caching is disabled. The GitHub Actions cache is shared mutable
#      state with default-branch fallback restore semantics, which means a
#      compromised actor with write access to any branch can plant
#      artifacts that future runs (including on `main`) will restore and
#      execute. We pay a few seconds per run for `go mod download` and a
#      cold compile in exchange for no persistent foothold for an attacker
#      to land on. If build times grow enough to feel slow, revisit with a
#      content-addressed scheme that disables `restore-keys` fallback.

name: ci

# Trigger model
# -------------
# `push` only. This is the most security-conservative posture available:
# only users with write access to this repository can push refs, so CI
# never executes code from an untrusted source. Fork PRs from external
# contributors will not get a CI signal until a maintainer pushes the
# commits to a branch in this repo (e.g. via `gh pr checkout` + push).
#
# We deliberately do NOT use `pull_request` (which would run untrusted PR
# code, even with secrets stripped) or `pull_request_target` (which is
# the canonical pwn vector — runs PR code with secrets in scope).
on:
  push:

# Empty top-level permissions => every job starts with a zero-scope token
# and must opt in explicitly.
permissions: {}

# Cancel in-progress runs for the same ref *unless* the ref is main.
# `github.run_id` is unique per run on main, so the group never collides
# there; on feature branches the group is shared across pushes to the
# same ref so a fast-follow push cancels the stale run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Defeat the Go auto-toolchain. Without this, `go test` would silently
  # download and use whatever toolchain `go.mod` points at, ignoring the
  # version we just installed and, worse, executing arbitrary downloaded
  # binaries before the linter runs.
  GOTOOLCHAIN: local

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: block
          # Endpoints required by checkout + setup-go + setup-just + the
          # `go install` calls in `just install-tools`. Any access outside
          # this list is blocked at the firewall level.
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            raw.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443
            dl.google.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Don't leave the GITHUB_TOKEN in .git/config where subsequent
          # steps (and any code they execute) could read it.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Reads the `go 1.26` line from go.mod so the source of truth
          # stays in one place.
          go-version-file: go.mod
          # Caching is deliberately disabled — see item 11 in the security
          # posture preamble. The cost is a few seconds of re-downloading
          # modules per run; the benefit is no shared mutable state for a
          # compromised actor to poison.
          cache: false

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install tooling
        run: just install-tools

      - name: Lint
        run: just lint

  test:
    name: test (race)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            raw.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443
            dl.google.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install tooling
        run: just install-tools

      - name: Test (race detector)
        run: just test-race
