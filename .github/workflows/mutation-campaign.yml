# Scheduled oracle mutation campaign gate (#108).
#
# This converts testing/mutation/RESULTS.md from human-maintained prose into an
# enforced gate. It runs the full mutation campaign at HEAD and fails if any
# mutant regressed (KILLED->SURVIVED), went STALE/BUILD-BROKEN, or drifted from
# the committed testing/mutation/baseline.json. A SURVIVED->KILLED improvement
# is reported but does not fail the job — refresh the baseline to bank it.
#
# Like oracle-scheduled.yml this is intentionally separate from push CI: the
# stress-tier mutants make a full campaign far too expensive for a per-commit
# gate. The security posture mirrors ci.yml (read the preamble there): every
# action pinned to a full commit SHA, zero-scope default token with per-job
# opt-in, persist-credentials disabled, harden-runner egress allowlist,
# GOTOOLCHAIN=local, no caching.

name: mutation-campaign

on:
  schedule:
    # Weekly, Mondays 03:42 UTC — off the top-of-hour Actions rush and distinct
    # from oracle-scheduled.yml's 6-hourly cadence so they don't contend.
    - cron: "42 3 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  GOTOOLCHAIN: local
  # The full campaign result; uploaded as an artifact and diffed against the
  # committed baseline by the gate. Kept under the workspace so upload-artifact
  # can find it.
  MUTATION_RESULT_JSON: ${{ github.workspace }}/mutation-artifacts/mutation-result.json

jobs:
  campaign:
    name: mutation campaign gate
    runs-on: arc
    # The full catalog includes stress-tier mutants (30m timeout each) plus the
    # restart tier; a comfortable ceiling that still bounds a wedged run.
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            raw.githubusercontent.com:443
            proxy.golang.org:443
            sum.golang.org:443
            storage.googleapis.com:443
            dl.google.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install tooling
        run: just install-tools

      - name: Mutation campaign + baseline gate
        run: just mutation-gate

      - name: Upload campaign result
        # The machine-readable result is the evidence for the gate's verdict;
        # capture it whether the job passed or failed so a refresh PR (to bank
        # an improvement or accept a new disposition) has the exact JSON to diff
        # the committed baseline against.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutation-campaign-result
          path: ${{ env.MUTATION_RESULT_JSON }}
          if-no-files-found: warn
          retention-days: 30

      - name: Failure summary
        if: failure()
        run: |
          {
            echo "## Mutation campaign gate failed"
            echo
            echo 'The gate diffed the full campaign against `testing/mutation/baseline.json`.'
            echo 'The failing mutant(s) and the violation kind are printed in the'
            echo '`Mutation campaign + baseline gate` step logs (lines prefixed `FAIL`).'
            echo
            echo "Likely causes:"
            echo "- **REGRESSION** (KILLED→SURVIVED): the oracle lost detection power — investigate before refreshing the baseline."
            echo "- **STALE / BUILD-BROKEN**: a mutant patch drifted from the code — refresh or retire it."
            echo "- **MISSING / NEW**: the catalog and baseline disagree — run \`just mutation-baseline\` and commit if intentional."
            echo
            echo 'Download the `mutation-campaign-result` artifact for the exact JSON.'
          } >> "$GITHUB_STEP_SUMMARY"
